<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shiyas S. | Mechanical Engineering Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #182033;
      --muted: #5f6f89;
      --line: #dbe2ee;
      --paper: #f7f9fc;
      --white: #ffffff;
      --blue: #2563eb;
      --teal: #0f9f9a;
      --green: #2f855a;
      --amber: #b7791f;
      --navy: #101827;
      --radius: 8px;
      --shadow: 0 18px 50px rgba(22, 32, 51, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(37, 99, 235, 0.08), transparent 360px),
        var(--paper);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
      gap: 28px;
      align-items: stretch;
      padding: 32px 0 24px;
    }

    .hero-main {
      position: relative;
      min-height: 500px;
      overflow: hidden;
      border-radius: var(--radius);
      color: var(--white);
      background:
        linear-gradient(115deg, rgba(16, 24, 39, 0.96), rgba(16, 24, 39, 0.72)),
        url("https://images.unsplash.com/photo-1581091215367-59ab6b1b0a15?auto=format&fit=crop&w=1500&q=80") center/cover;
      box-shadow: var(--shadow);
    }

    .hero-main::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 42%;
      background: linear-gradient(0deg, rgba(16, 24, 39, 0.9), transparent);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: 500px;
      flex-direction: column;
      justify-content: space-between;
      padding: 34px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.24);
